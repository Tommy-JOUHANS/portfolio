services:
db:
image: postgres:15-alpine
container_name: cyberaudit-dbrestart: unless-stopped
environment:
POSTGRES_DB: ${POSTGRES_DB:-cyberaudit}
POSTGRES_USER: ${POSTGRES_USER:-cyberaudit}
POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
ports:
- "5432:5432"
volumes:
- pg_data:/var/lib/postgresql/data
healthcheck:
test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
interval: 5s
timeout: 5s
retries: 5
redis:
image: redis:7-alpine
container_name: cyberaudit-redis
restart: unless-stopped
ports:
- "6379:6379"
volumes:
- redis_data:/data
backend:
build: ./backend
container_name: cyberaudit-backend
command: python manage.py runserver 0.0.0.0:8000
volumes:
- ./backend:/app
ports:
- "8000:8000"
env_file: .env
depends_on:
db:
condition: service_healthy
redis:
condition: service_started
celery_worker:
build: ./backend
container_name: cyberaudit-celery
command: celery -A config worker -l info
volumes:
- ./backend:/app
env_file: .env
depends_on:
- backend
- redis
volumes:
pg_data:
redis_
